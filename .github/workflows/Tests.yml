name: Tests

permissions:
    contents: write
on:
    push:
        branches: [ master ]
    pull_request:
        branches: [ master ]

jobs:
    changes:
        runs-on: ubuntu-latest
        name: Assess changes
        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Decide checks 💖
                uses: tj-actions/changed-files@v47
                id: changes
                with:
                    files_ignore: |
                        README.md
                        LICENSE
                        NOTICE
                        .mailmap
                        .gitignore
                        .github/FUNDING.yml
                        Scripts/AdditionalRepositories
        outputs:
            code_changed: ${{ steps.changes.outputs.any_changed }}

    Linux:
        runs-on: ubuntu-24.04
        name: Ubuntu 24.04
        needs: changes
        if: needs.changes.outputs.code_changed == 'true'
        steps:
            -   name: 💖 Install Swift 💖
                uses: rarestype/swift-install-action@v1
                with:
                    swift-release: 6.3.1-RELEASE

            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Run tests 💖
                run: Scripts/TestAll
                env:
                    AUTOMATION_APP_CLIENT: ${{ vars.AUTOMATION_APP_CLIENT }}
                    AUTOMATION_APP_SECRET: ${{ secrets.AUTOMATION_APP_SECRET }}
                    AUTOMATION_APP_KEY: ${{ secrets.AUTOMATION_APP_KEY }}

    macOS:
        runs-on: macos-26
        needs: changes
        if: needs.changes.outputs.code_changed == 'true'
        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Select Xcode 26.4 💖
                run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

            -   name: 💖 Run tests 💖
                run: Scripts/TestAll

